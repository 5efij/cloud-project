<!DOCTYPE html>
<html>

<head>

<title>Cyber Threat Intelligence Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="loginPage">

<h2>Cyber Security Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none;">

<h1>Cyber Threat Intelligence Dashboard</h1>

<div class="stats">

<div class="card">
<h2 id="attacks">1200</h2>
<p>Total Attacks Today</p>
</div>

<div class="card">
<h2>540</h2>
<p>Phishing</p>
</div>

<div class="card">
<h2>320</h2>
<p>Malware</p>
</div>

<div class="card">
<h2>380</h2>
<p>DDoS</p>
</div>

</div>

<h3>Filter Attack Type</h3>

<select id="filter" onchange="filterAttacks()">

<option value="all">All</option>
<option value="phishing">Phishing</option>
<option value="malware">Malware</option>
<option value="ddos">DDoS</option>

</select>

<div id="map"></div>

<h2>Attack Statistics</h2>

<canvas id="attackChart"></canvas>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>

</html>
